<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Uzair | Color Flipper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">

<header class="header">
  <div class="brand">Uzair.dev</div>
  <button id="themeToggle">Toggle Theme</button>
</header>

<main class="container">
  <h1>Color Flipper</h1>
  <p class="subtitle">100 Days of JavaScript</p>

  <div class="card">
    <p>Background Color: <span id="color">#0f172a</span></p>
    <button id="changeColor">Change Color</button>
  </div>
</main>

<footer class="footer">
  Built by Uzair Hussnain • 100 Days of Code
</footer>

<script src="script.js"></script>
</body>
</html>
